<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neko</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column;
    font: 13px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #1e1e1e; color: #e8e8e8;
  }
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid #333; flex-shrink: 0;
  }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
  header .dot.on { background: #22c55e; }
  header b { font-weight: 600; }
  header .sub { color: #888; font-size: 11px; margin-left: auto; }
  #log { flex: 1; overflow-y: auto; padding: 10px 12px; }
  .msg { margin: 8px 0; white-space: pre-wrap; word-break: break-word; }
  .msg.user { color: #7cc4ff; }
  .msg.user::before { content: "> "; color: #4d9fff; }
  .msg.assistant { color: #e8e8e8; }
  .msg.info { color: #888; font-size: 12px; }
  .msg.error { color: #ff6b6b; }
  .msg.tool_call { color: #c88cff; font-size: 12px; }
  .msg.tool_result { color: #9aa; font-size: 12px; }
  .msg.stream { color: #e8e8e8; }
  form { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #333; flex-shrink: 0; }
  textarea {
    flex: 1; resize: none; min-height: 38px; max-height: 140px;
    background: #2a2a2a; color: #e8e8e8; border: 1px solid #444; border-radius: 6px;
    padding: 8px; font: inherit;
  }
  button {
    background: #4d9fff; color: #001; border: none; border-radius: 6px;
    padding: 0 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { background: #444; color: #888; cursor: default; }
  @media (prefers-color-scheme: light) {
    body { background: #fff; color: #1a1a1a; }
    header, form { border-color: #e5e5e5; }
    textarea { background: #f6f6f6; color: #1a1a1a; border-color: #ddd; }
    .msg.assistant, .msg.stream { color: #1a1a1a; }
  }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <b>Neko</b>
    <span class="sub" id="sub">connecting…</span>
  </header>
  <div id="log"></div>
  <form id="form">
    <textarea id="input" placeholder="Message Neko…  (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="send" type="submit" disabled>Send</button>
  </form>
  <script src="sidepanel.js"></script>
</body>
</html>
