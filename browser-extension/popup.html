<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neko Browser Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <div class="mark">/\ . . &gt;</div>
      <div><strong>Neko Browser</strong><small>local tab capability</small></div>
      <span id="status" class="pill">offline</span>
    </header>

    <section class="tab">
      <span class="dot" aria-hidden="true"></span>
      <div><strong id="tab-title">No tab attached</strong><small id="tab-host">Open Neko bridge, then attach this tab.</small></div>
    </section>

    <button id="attach" class="primary">Attach this tab to Neko</button>
    <div class="row">
      <button id="detach">Detach</button>
      <button id="stop" class="danger">Emergency stop</button>
    </div>

    <section class="permissions">
      <h2>Session permissions</h2>
      <label><span><strong>Read visible page</strong><small>Granted only while this tab is attached</small></span><input type="checkbox" checked disabled></label>
      <label><span><strong>Click, scroll, navigate</strong><small>Off by default</small></span><input id="click-grant" type="checkbox"></label>
      <label><span><strong>Type non-sensitive text</strong><small>Passwords, OTP and payment fields stay blocked</small></span><input id="type-grant" type="checkbox"></label>
    </section>

    <section class="audit">
      <h2>Local audit</h2>
      <ol id="audit"><li>No actions yet</li></ol>
    </section>

    <p id="error" role="alert"></p>
    <footer><span>No cookies leave Chrome</span><span id="session">session -</span></footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
