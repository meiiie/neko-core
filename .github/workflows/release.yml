name: release

# Build standalone, Bun-free binaries for every OS on a version tag, and attach
# them to a GitHub Release. Users then install with one line (see install.sh / install.ps1).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The release is created ONCE, before any build. When every matrix job created it
  # instead (softprops/action-gh-release), two jobs racing on a fresh tag could each
  # create one; the duplicate was discarded and its asset upload 404'd -- v0.5.0
  # shipped without neko-linux-arm64 until a manual re-run. gh is synchronous: when
  # this job ends, the release exists and is discoverable.
  release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - name: create the GitHub release for the tag (idempotent for re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" ||
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes

  build:
    name: build ${{ matrix.asset }}
    needs: release
    runs-on: ${{ matrix.os }}
    # A hung runtime (the Rosetta lesson) must fail fast, not squat on a runner for 6 hours.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Four targets build NATIVELY (bun embeds ITSELF - required on canary, which publishes no
          # cross-target downloads: "Target platform ...-v1.4.0 is not available" killed the two
          # cross-compiled jobs at v0.7.5). Native also means the artifact gets BOTH smokes:
          # __uiprobe (render) and input-probe (a real PTY hears keys - the Bun-1.3.14 class).
          - { os: ubuntu-latest,    target: bun-linux-x64,    asset: neko-linux-x64,       smoke: true }
          - { os: ubuntu-24.04-arm, target: bun-linux-arm64,  asset: neko-linux-arm64,     smoke: true }
          - { os: macos-latest,     target: bun-darwin-arm64, asset: neko-macos-arm64,     smoke: true }
          # Intel macOS: no Intel runners left, and the x64 bun HANGS under Rosetta on the arm64
          # runner (first re-tag of v0.7.5 sat 45min in that step). So this one target cross-compiles
          # from STABLE bun (versioned cross-target runtimes exist only for releases) and is not
          # smoked (x64 artifacts can't run here either). The canary-fixed stdin regression is
          # Windows-only, so a stable runtime is correct for Intel macs. Unify at the next stable.
          - { os: macos-latest,     target: bun-darwin-x64,   asset: neko-macos-x64,       smoke: false, bun: latest }
          - { os: windows-latest,   target: bun-windows-x64,  asset: neko-windows-x64.exe, smoke: true }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # PINNED TO CANARY (temporarily - revert to `latest` at the first stable AFTER 1.3.14):
          # stable Bun 1.3.14 has a Windows raw-stdin regression on some machines (a minimal
          # `stdin.setRawMode(true)` probe receives ZERO key bytes while Node in the same terminal
          # receives them; bun is mid-rework of its Windows I/O - "Remove libuv on Windows" #33160).
          # A 1.3.14-compiled neko renders but cannot be typed into on such machines; the canary
          # (1.4.0) runtime is field-verified to fix exactly that. A matrix entry can override
          # (darwin-x64 cross-compiles from stable - see the matrix comment).
          bun-version: ${{ matrix.bun || 'canary' }}
      - run: bun install --frozen-lockfile
      - name: compile
        # scripts/build.ts is the ONE source of truth for compile flags (NODE_ENV define, tsconfig
        # override, and - on the Windows runner only - the PE branding: Task Manager "Neko Core", the
        # cat icon, publisher/version/copyright). bun REJECTS --windows-* off Windows, so the script
        # gates them by host; args are passed as argv (no shell quoting fragility across runners).
        shell: bash
        run: bun scripts/build.ts --target=${{ matrix.target }} --outfile=${{ matrix.asset }}
      - name: smoke-test the artifact (renders a real Ink/JSX tree)
        if: ${{ matrix.smoke }}
        shell: bash
        run: ./${{ matrix.asset }} __uiprobe
      - name: input smoke - the artifact must HEAR keys through a real PTY
        # The gate the Bun-1.3.14 field bug taught us: a runtime whose raw-stdin bridge drops keys
        # renders perfectly (__uiprobe passes) and fails ONLY here. Spawns the artifact's
        # `doctor keys` under Bun.Terminal (ConPTY/forkpty), types into it, asserts the byte lands.
        if: ${{ matrix.smoke }}
        shell: bash
        run: bun scripts/input-probe.ts ./${{ matrix.asset }}
      - name: attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "${{ matrix.asset }}" --repo "$GITHUB_REPOSITORY" --clobber
