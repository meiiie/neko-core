name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The full verify loop on every OS we ship binaries for - a Linux-only CI can't guarantee the
  # macOS/Windows builds actually work (the owner develops on Windows; CI covers the other two).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # PINNED TO CANARY to match release.yml (stable 1.3.14 Windows raw-stdin regression -
          # see the comment there). Revert BOTH to `latest` at the first stable after 1.3.14.
          bun-version: canary
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - name: cross-check with stable 5.9 (typecheck runs 7.0-rc; drop this step at 7.0 GA)
        run: bun run typecheck:stable
      - run: bun test
      - name: policy audit (safe/gated boundary)
        run: bun bin/neko.ts policy
      - name: build the single binary (bakes NODE_ENV=production - see package.json)
        run: bun run build
