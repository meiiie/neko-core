name = "neko-relay"
main = "worker.js"
compatibility_date = "2026-01-01"

# Serve client.html as a text module (imported by worker.js).
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# One Durable Object per session holds the queue + long-poll waiters.
[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelaySession"

[[migrations]]
tag = "v1"
new_classes = ["RelaySession"]
