<style>
  /* Neko remote - the terminal in your pocket. One accent (the mascot's amber), near-black surfaces,
     quiet borders; tool activity renders like the terminal's tool lines. */
  :root {
    color-scheme: dark;
    --bg: #121215; --panel: #1a1a1f; --panel2: #17171b; --line: #26262c; --line2: #2e2e36;
    --ink: #e9e9ee; --dim: #8d8d99; --faint: #64646e;
    --amber: #e8a24b; --amber2: #c47f2e; --ok: #3ecf8e; --warn: #e8a24b; --err: #f0716b;
    --mono: ui-monospace, "Cascadia Mono", "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; font: 15.5px/1.55 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); overscroll-behavior: none; }

  header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 10px; padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top)); background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: saturate(1.3) blur(14px); border-bottom: 1px solid var(--line); }
  .logo { width: 30px; height: 30px; border-radius: 9px; display: block; }
  .title { font-weight: 640; font-size: 16px; letter-spacing: .2px; }
  .title small { color: var(--faint); font-weight: 480; font-size: 11.5px; margin-left: 7px; letter-spacing: .4px; }
  .pill { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); background: var(--panel2); border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; transition: color .25s, border-color .25s; white-space: nowrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .pill.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 30%, var(--line)); }
  .pill.ok .dot { background: var(--ok); animation: pulse 2.6s ease-out infinite; }
  .pill.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 30%, var(--line)); }
  .pill.warn .dot { background: var(--warn); }
  .pill.err { color: var(--err); border-color: color-mix(in srgb, var(--err) 35%, var(--line)); }
  .pill.err .dot { background: var(--err); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 55%, transparent); } 70%,100% { box-shadow: 0 0 0 7px transparent; } }
  .gear { margin-left: 2px; width: 32px; height: 32px; border: 1px solid var(--line); background: var(--panel2); border-radius: 9px; color: var(--dim); display: grid; place-items: center; cursor: pointer; transition: transform .15s, color .15s, border-color .15s; }
  .gear:active { transform: scale(.92); }
  .gear.open { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 35%, var(--line)); }
  .gear svg { width: 16px; height: 16px; }

  .cfg { display: grid; gap: 8px; padding: 0 14px; max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; border-bottom: 1px solid transparent; background: color-mix(in srgb, var(--panel2) 55%, transparent); }
  .cfg.show { max-height: 360px; padding: 12px 14px 14px; border-bottom-color: var(--line); }
  .cfg label { font-size: 10.5px; color: var(--faint); margin: 2px 0 -4px; text-transform: uppercase; letter-spacing: .7px; }
  .cfg input { background: #101013; border: 1px solid var(--line); color: var(--ink); border-radius: 10px; padding: 10px 12px; font: inherit; font-size: 14px; transition: border-color .15s, box-shadow .15s; }
  .cfg input:focus { outline: 0; border-color: var(--amber2); box-shadow: 0 0 0 3px color-mix(in srgb, var(--amber2) 20%, transparent); }
  .cfg .hint { font-size: 12px; color: var(--faint); line-height: 1.5; }
  .cfg .hint b { color: var(--warn); font-weight: 560; }

  #log { padding: 16px 14px 24px; display: flex; flex-direction: column; gap: 13px; min-height: calc(100dvh - 210px); }
  .empty { margin: auto; text-align: center; color: var(--dim); font-size: 13.5px; line-height: 1.7; }
  .empty img { width: 74px; height: 74px; border-radius: 20px; margin-bottom: 12px; opacity: .95; }
  .empty .t { color: var(--ink); font-weight: 560; font-size: 14.5px; }

  .row { display: flex; animation: rise .25s cubic-bezier(.2,.7,.3,1) both; }
  .row.me { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .row { animation: none; } .pill.ok .dot { animation: none; } }
  .stack { max-width: 86%; display: flex; flex-direction: column; align-items: flex-start; }
  .me .stack { align-items: flex-end; }
  .who { font-size: 10.5px; color: var(--amber); margin: 0 0 3px 3px; font-weight: 620; letter-spacing: .6px; text-transform: lowercase; }
  .bub { padding: 9px 13px; border-radius: 15px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; width: fit-content; max-width: 100%; }
  .me .bub { background: #26200f; border: 1px solid color-mix(in srgb, var(--amber2) 26%, var(--line)); border-bottom-right-radius: 6px; }
  .neko .bub { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 6px; }
  .neko.err .bub { border-color: color-mix(in srgb, var(--err) 40%, var(--line)); color: #f4a9a5; }
  .bub pre { background: #101013; border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; overflow-x: auto; font: 12.5px/1.5 var(--mono); margin: 6px 0; white-space: pre; }
  .bub code { background: #101013; border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; font: 12.5px var(--mono); }
  .bub pre code { background: none; border: 0; padding: 0; }
  .bub a { color: var(--amber); text-underline-offset: 2px; }
  /* The process log: the terminal's tool lines, miniaturized. */
  .proc { font: 12px/1.75 var(--mono); color: var(--dim); margin: 0 0 6px; white-space: pre-wrap; overflow-wrap: anywhere; }
  .proc .b { color: var(--ok); }
  .proc .spin { color: var(--amber); }
  .proc:last-child { margin-bottom: 0; }

  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); animation: bob 1.1s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bob { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }

  .composer { position: sticky; bottom: 0; display: flex; align-items: flex-end; gap: 9px; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(14px); border-top: 1px solid var(--line); }
  .composer textarea { flex: 1; resize: none; max-height: 140px; background: #101013; border: 1px solid var(--line2); color: var(--ink); border-radius: 13px; padding: 11px 13px; font: inherit; line-height: 1.45; transition: border-color .15s, box-shadow .15s; }
  .composer textarea:focus { outline: 0; border-color: var(--amber2); box-shadow: 0 0 0 3px color-mix(in srgb, var(--amber2) 18%, transparent); }
  .send { width: 44px; height: 44px; flex: none; border: 0; border-radius: 13px; background: linear-gradient(135deg, var(--amber), var(--amber2)); color: #17120a; display: grid; place-items: center; cursor: pointer; transition: transform .12s, opacity .2s, filter .2s; box-shadow: 0 4px 16px -6px var(--amber2); }
  .send:active { transform: scale(.9); }
  .send:disabled { opacity: .45; filter: grayscale(.6); box-shadow: none; cursor: default; }
  .send svg { width: 20px; height: 20px; }
  .send.stop { background: #3a1512; color: var(--err); box-shadow: 0 4px 14px -7px var(--err); border: 1px solid color-mix(in srgb, var(--err) 40%, var(--line)); }
</style></head>

<form class="composer" id="f">
  <textarea id="m" rows="1" placeholder="Message Neko…" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"></textarea>
  <button class="send" id="send" type="submit" aria-label="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
</form>
<script>
  const $ = (id) => document.getElementById(id);
  const log = $("log"), relay = $("relay"), session = $("session"), token = $("token"), secret = $("secret"), m = $("m");
  relay.value = location.origin;

  const save = () => { try { localStorage.nekoSession = session.value; localStorage.nekoToken = token.value; localStorage.nekoSecret = secret.value; } catch {} };
  // Apply pairing params from a fragment/URL string. Returns true when it found any.
  function applyPairing(str) {
    const hashAt = str.indexOf("#");
    const frag = hashAt >= 0 ? str.slice(hashAt + 1) : str;
    const h = new URLSearchParams(frag);
    if (!(h.get("s") || h.get("t") || h.get("k"))) return false;
    if (h.get("s")) session.value = h.get("s");
    if (h.get("t")) token.value = h.get("t");
    if (h.get("k")) secret.value = h.get("k");
    save(); // persist IMMEDIATELY - v1 lost the pairing on reload because only typing saved it
    return true;
  }
  // One-tap pairing: /relay puts secrets in the #fragment (never sent to the server).
  if (location.hash.length > 1 && applyPairing(location.hash)) {
    history.replaceState(null, "", location.pathname);
  } else {
    try { session.value = localStorage.nekoSession||""; token.value = localStorage.nekoToken||""; secret.value = localStorage.nekoSecret||""; } catch {}
  }
  // Some in-app browsers (Messenger…) strip the #fragment: pasting the whole link works instead.
  $("pastelink").addEventListener("input", () => {
    if (applyPairing($("pastelink").value.trim())) { $("pastelink").value = ""; online = null; kidMismatch = false; refresh(); checkAlive(); }
  });

  const paired = () => !!(session.value.trim() && token.value.trim());
  const base = () => relay.value.trim().replace(/\/+$/, "");
  const auth = () => ({ authorization: "Bearer " + token.value.trim() });

  // Status pill: truthful - asks the relay whether Neko is connected AND whether our secret matches.
  let online = null; // null = unknown
  let kidMismatch = false;
  function refresh() {
    const p = paired();
    const cls = !p ? "" : kidMismatch ? "err" : online ? "ok" : online === false ? "warn" : "";
    $("pill").className = "pill" + (cls ? " " + cls : "");
    $("pilltxt").textContent = !p ? "not paired"
      : kidMismatch ? "key mismatch"
      : online === null ? (secret.value.trim() ? "paired · E2E" : "paired")
      : online ? "Neko online" + (secret.value.trim() ? " · E2E" : "") : "Neko offline";
    $("cfghint").innerHTML = kidMismatch
      ? "<b>The secret doesn't match Neko's.</b> On your machine run <code>/relay qr</code> and re-scan (or paste the fresh link above)."
      : "Pair once - it sticks. On your machine: <code>/relay qr</code> shows the code again.";
  }
  async function myKid() {
    const s = secret.value.trim();
    if (!s || !crypto.subtle) return null;
    const d = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return [...new Uint8Array(d)].map((b) => b.toString(16).padStart(2, "0")).join("").slice(0, 8);
  }
  async function checkAlive() {
    if (!paired()) { online = null; kidMismatch = false; refresh(); return; }
    try {
      const r = await fetch(base() + "/alive?session=" + encodeURIComponent(session.value.trim()), { headers: auth() });
      if (r.ok) {
        const g = await r.json();
        online = !!g.online;
        const mine = await myKid();
        kidMismatch = !!(g.kid && mine && g.kid !== mine);
      } else { online = null; kidMismatch = false; }
    } catch { online = null; }
    refresh();
  }
  for (const el of [relay, session, token, secret]) el.oninput = () => { save(); online = null; kidMismatch = false; refresh(); };
  $("gear").onclick = () => { const c = $("cfg"); c.classList.toggle("show"); $("gear").classList.toggle("open", c.classList.contains("show")); };
  if (!paired()) $("gear").click();
  refresh(); checkAlive();
  setInterval(checkAlive, 25_000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) checkAlive(); });

  // auto-growing composer; Enter sends, Shift+Enter = newline
  const grow = () => { m.style.height = "auto"; m.style.height = Math.min(m.scrollHeight, 140) + "px"; };
  m.addEventListener("input", grow);
  m.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("f").requestSubmit(); } });

  // E2E (AES-256-GCM; key = PBKDF2(secret)) - wire-compatible with the Node host (relay-crypto.ts)
  const b64 = (u) => btoa(String.fromCharCode(...u)), ub64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  let kp = null, kf = "";
  function key() { const s = secret.value.trim(); if (!s) return null;
    if (kf !== s) { kf = s; kp = crypto.subtle.importKey("raw", new TextEncoder().encode(s), "PBKDF2", false, ["deriveKey"])
      .then((b) => crypto.subtle.deriveKey({ name:"PBKDF2", salt:new TextEncoder().encode("neko-relay-e2e-v1"), iterations:100000, hash:"SHA-256" }, b, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"])); }
    return kp; }
  async function sealMsg(k, t) { const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = new Uint8Array(await crypto.subtle.encrypt({ name:"AES-GCM", iv }, k, new TextEncoder().encode(t))); return { iv: b64(iv), ct: b64(ct) }; }
  async function unseal(k, s) { return new TextDecoder().decode(await crypto.subtle.decrypt({ name:"AES-GCM", iv: ub64(s.iv) }, k, ub64(s.ct))); }

  // Markdown-lite (escape FIRST, then decorate): fences, tables->pre, inline code, bold, links, bullets.
  function md(t) {
    let s = t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, __, c) => "<pre><code>" + c.replace(/\n$/, "") + "</code></pre>");
    s = s.replace(/((?:^\|.*\|[ \t]*$\n?){2,})/gm, (t2) => "<pre>" + t2.replace(/\n$/, "") + "</pre>"); // pipe tables read best in mono
    s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");
    s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    s = s.replace(/^#{1,4} (.*)$/gm, "<b>$1</b>");
    s = s.replace(/^[-*] /gm, "• ");
    return s;
  }
  const esc = (t) => t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // The process log: same shape as the terminal's tool lines ("● Read(src/agent.ts)").
  function procHtml(act, running) {
    if (!act?.length && !running) return "";
    const lines = (act || []).map((l) => '<span class="b">●</span> ' + esc(l));
    if (running) lines.push('<span class="spin">' + SPIN[spinI] + "</span> working…");
    return '<div class="proc">' + lines.join("\n") + "</div>";
  }
  const SPIN = ["⠋","⠙","⠹","⠸","⠼","⠴","⠦","⠧","⠇","⠏"];
  let spinI = 0;
  setInterval(() => { spinI = (spinI + 1) % SPIN.length; for (const el of document.querySelectorAll(".proc .spin")) el.textContent = SPIN[spinI]; }, 90);

  function render(bub, state) {
    bub.innerHTML = procHtml(state.act, !state.done) + (state.text ? md(state.text) : state.done ? "" : "");
    if (!state.text && !state.act?.length && !state.done) bub.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
  }
  // A reply payload is either plain text or a {text, act} envelope (v2 host over ws).
  function parseReply(raw) {
    if (typeof raw === "string" && raw.startsWith("{")) {
      try { const o = JSON.parse(raw); if (typeof o.text === "string") return { text: o.text, act: Array.isArray(o.act) ? o.act : [] }; } catch {}
    }
    return { text: String(raw ?? ""), act: [] };
  }

  const empty = $("empty");
  function row(who, cls) {
    empty?.remove();
    const r = document.createElement("div"); r.className = "row " + who + (cls ? " " + cls : "");
    const st = document.createElement("div"); st.className = "stack";
    if (who === "neko") { const w = document.createElement("div"); w.className = "who"; w.textContent = "neko"; st.appendChild(w); }
    const b = document.createElement("div"); b.className = "bub";
    st.appendChild(b); r.appendChild(st); log.appendChild(r);
    requestAnimationFrame(() => r.scrollIntoView({ block: "end", behavior: "smooth" }));
    return b;
  }
  const stick = (b) => requestAnimationFrame(() => b.closest(".row").scrollIntoView({ block: "end" }));
  const errRow = (bub, text) => { bub.closest(".row").classList.add("err"); bub.textContent = text; };

  // Send doubles as STOP while a turn runs (reaches the host mid-turn on a v2 relay).
  const SEND_SVG = $("send").innerHTML;
  const STOP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  let awaiting = false;
  function setAwaiting(on) {
    awaiting = on;
    $("send").classList.toggle("stop", on);
    $("send").innerHTML = on ? STOP_SVG : SEND_SVG;
    $("send").setAttribute("aria-label", on ? "stop" : "send");
  }

  $("f").onsubmit = async (e) => {
    e.preventDefault();
    if (awaiting) { // STOP: ask the relay to interrupt the running turn
      try { await fetch(base() + "/interrupt", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim() }) }); } catch {}
      return;
    }
    const msg = m.value.trim(); if (!msg) return;
    if (!paired()) { $("cfg").classList.add("show"); $("gear").classList.add("open"); return; }
    if (kidMismatch) { errRow(row("neko"), "The pairing secret doesn't match the one Neko is using. Run /relay qr on your machine and re-scan (or paste the fresh link in settings)."); return; }
    m.value = ""; grow();
    row("me").textContent = msg;
    const out = row("neko");
    render(out, { text: "", act: [], done: false });
    setAwaiting(true);
    try {
      const k = await key();
      const payload = k ? await sealMsg(k, msg) : msg;
      const r = await fetch(base() + "/send", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), message: payload }) });
      if (!r.ok) { errRow(out, r.status === 401 ? "Not authorized - the pairing is stale. Re-scan the QR from /relay." : "send failed (HTTP " + r.status + ")"); return; }
      const { id } = await r.json();
      // Long-poll for updates: partials render live (seq-cursor so nothing repeats), done ends the wait.
      let seen = 0, done = false, offlineWarned = false, sawAnything = false;
      const t0 = Date.now();
      while (!done && Date.now() - t0 < 60 * 60_000) {
        const rr = await fetch(base() + "/result?session=" + encodeURIComponent(session.value.trim()) + "&id=" + id + "&seen=" + seen, { headers: auth() });
        if (rr.status === 200) {
          const g = await rr.json();
          seen = g.seq || seen; done = !!g.done; sawAnything = true;
          let raw;
          try { raw = k && g.reply && g.reply.iv ? await unseal(k, g.reply) : g.reply; }
          catch { errRow(out, "Can't decrypt the reply - the pairing secret doesn't match. Run /relay qr on your machine and re-scan."); checkAlive(); return; }
          const state = parseReply(raw);
          state.done = done;
          render(out, state); stick(out);
        } else if (!offlineWarned) {
          await checkAlive();
          if (online === false) { render(out, { text: "", act: ["waiting - Neko is offline; the task runs when /relay reconnects"], done: false }); offlineWarned = true; }
        }
      }
      if (!done && !sawAnything) errRow(out, "No reply - is /relay running on your machine?");
    } catch (err) { errRow(out, "error: " + err.message); }
    finally { setAwaiting(false); m.focus(); checkAlive(); }
  };
</script>
