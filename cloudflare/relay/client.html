<style nonce="__CSP_NONCE__">
  /* Neko remote = the Neko terminal, on your phone. Same monospace, same amber (#e6932e), same
     dim rules and `>` prompt and bottom status bar. Every rule below mirrors a real terminal element;
     nothing decorative. */
  :root {
    color-scheme: dark;
    --bg: #0c0c0c; --ink: #d4d4d4; --dim: #9a9a9a; --faint: #6a6a6a;
    --amber: #e6932e; --cyan: #56b6c2; --ok: #3fb950; --err: #f47067;
    --line: #262626; --line2: #333;
    --mono: "Cascadia Mono", "Cascadia Code", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.65 var(--mono); overscroll-behavior: none; overflow-x: hidden; }
  a { color: var(--cyan); text-underline-offset: 2px; }

  /* Centered column framed like a terminal window on wide screens (the desktop fix). */
  .app { max-width: 820px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
  @media (min-width: 860px) { .app { border-left: 1px solid var(--line); border-right: 1px solid var(--line); } }

  /* Header = the CLI's banner, verbatim: kaomoji logo column + [title / status / host] block. */
  header { position: sticky; top: 0; z-index: 5; display: grid; grid-template-columns: auto 1fr auto; align-items: start; gap: 14px; padding: 13px 16px 11px; padding-top: max(13px, env(safe-area-inset-top)); background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .mark { color: var(--amber); font-size: 14px; line-height: 1.6; letter-spacing: 1px; white-space: nowrap; }
  .hgrid { min-width: 0; }
  .htitle { color: var(--ink); font-weight: 700; letter-spacing: .2px; }
  .htitle small { color: var(--dim); font-weight: 400; }
  .hstatus { color: var(--dim); font-size: 12.5px; margin-top: 1px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .hstatus .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .hstatus.ok { color: var(--ok); } .hstatus.ok .dot { background: var(--ok); animation: pulse 2.6s ease-out infinite; }
  .hstatus.warn { color: var(--amber); } .hstatus.warn .dot { background: var(--amber); }
  .hstatus.err { color: var(--err); } .hstatus.err .dot { background: var(--err); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 55%, transparent); } 70%,100% { box-shadow: 0 0 0 6px transparent; } }
  .hhost { color: var(--faint); font-size: 12px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hactions { display: flex; align-items: center; gap: 7px; }
  .hostpick { min-width: 30px; height: 30px; padding: 0 9px; border: 1px solid var(--line); background: transparent; border-radius: 7px; color: var(--dim); font: 11.5px var(--mono); cursor: pointer; }
  .hostpick.open, .hostpick:active { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, var(--line)); }
  .gear { width: 30px; height: 30px; border: 1px solid var(--line); background: transparent; border-radius: 7px; color: var(--dim); display: grid; place-items: center; cursor: pointer; transition: color .15s, border-color .15s; }
  .gear:active { transform: scale(.92); }
  .gear.open { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, var(--line)); }
  .gear svg { width: 15px; height: 15px; }

  /* Settings drawer = manual/advanced pairing + relay. Hidden until the gear opens it. */
  .cfg { display: grid; gap: 9px; padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; border-bottom: 1px solid transparent; }
  .cfg.show { max-height: 420px; padding: 13px 16px 15px; border-bottom-color: var(--line); }
  .cfg label { font-size: 11px; color: var(--faint); letter-spacing: .3px; }
  .cfg input { background: #0a0a0a; border: 1px solid var(--line2); color: var(--ink); border-radius: 7px; padding: 9px 11px; font: 13px var(--mono); transition: border-color .15s, box-shadow .15s; }
  .cfg input:focus { outline: 0; border-color: var(--amber); box-shadow: 0 0 0 2px color-mix(in srgb, var(--amber) 22%, transparent); }
  .cfg .btn { justify-self: start; background: transparent; border: 1px solid var(--line2); color: var(--dim); border-radius: 7px; padding: 7px 12px; font: 12.5px var(--mono); cursor: pointer; }
  .cfg .btn:active { transform: scale(.96); }

  /* One pairing is a hub; this terminal-like drawer switches among running/recent Neko sessions. */
  .sessions { display: none; padding: 7px 10px 9px; border-bottom: 1px solid var(--line); background: #0a0a0a; }
  .sessions.show { display: grid; gap: 4px; }
  .session { width: 100%; display: grid; grid-template-columns: 9px minmax(0,1fr) auto; gap: 9px; align-items: center; text-align: left; border: 1px solid transparent; border-radius: 6px; padding: 7px 8px; background: transparent; color: var(--ink); font: 12.5px/1.35 var(--mono); cursor: pointer; }
  .session:hover, .session.active { border-color: var(--line2); background: #111; }
  .session .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .session.online .sdot { background: var(--ok); }
  .session .smain { min-width: 0; }
  .session .sname, .session .spath { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session .spath, .session .smodel { color: var(--faint); font-size: 11px; }
  .session.busy .smodel { color: var(--amber); }

  /* Transcript = terminal flow: `> ` user echo (cyan), neko reply, `●` tool lines. No chat bubbles. */
  #log { flex: 1; padding: 14px 16px 24px; }
  .turn { white-space: pre-wrap; overflow-wrap: anywhere; }
  .turn.user { color: var(--cyan); margin-top: 18px; }
  .turn.user:first-child { margin-top: 2px; }
  .turn.user .mk { color: var(--amber); }
  .turn.neko { margin-top: 6px; color: var(--ink); }
  .turn.neko.err { color: var(--err); }
  .proc { color: var(--dim); font-size: 13px; line-height: 1.75; }
  .proc .b { color: var(--ok); }
  .proc .sp { color: var(--amber); }
  .body b { color: var(--ink); font-weight: 700; }
  .body a { word-break: break-all; }
  .body pre { background: #0a0a0a; border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; white-space: pre; font-size: 13px; }
  .body code { color: #d7ba7d; }
  .body pre code { color: var(--ink); }
  .typing { display: inline-flex; gap: 4px; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); animation: bob 1.1s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bob { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-4px); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .typing i, .hstatus.ok .dot { animation: none; } }

  /* Pairing card (unpaired) = a calm centered focus, not a field dump. */
  .pair { max-width: 360px; margin: 8vh auto 0; text-align: center; padding: 0 8px; }
  .pair img { width: 66px; height: 66px; border-radius: 16px; margin-bottom: 14px; }
  .pair h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--ink); }
  .pair p { color: var(--dim); font-size: 13px; line-height: 1.7; margin: 0 0 16px; }
  .pair p code { color: var(--amber); }
  .pair input { width: 100%; background: #0a0a0a; border: 1px solid var(--line2); color: var(--ink); border-radius: 8px; padding: 11px 12px; font: 13px var(--mono); text-align: center; }
  .pair input:focus { outline: 0; border-color: var(--amber); box-shadow: 0 0 0 2px color-mix(in srgb, var(--amber) 22%, transparent); }
  .pair .adv { margin-top: 14px; color: var(--faint); font-size: 12.5px; cursor: pointer; user-select: none; }
  .pair .note { color: var(--faint); font-size: 11.5px; line-height: 1.7; margin-top: 18px; }
  .idle { color: var(--faint); padding: 6px 0; font-size: 12.5px; }

  /* Composer = the terminal's rule-framed `>` prompt + a bottom status bar. */
  .foot { position: sticky; bottom: 0; background: color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
  .composer { display: flex; align-items: flex-end; gap: 9px; padding: 9px 16px 7px; }
  .composer .pr { color: var(--amber); padding: 9px 0; font-size: 15px; line-height: 1.4; }
  .composer textarea { flex: 1; resize: none; max-height: 128px; background: transparent; border: 0; color: var(--ink); padding: 9px 0; font: 14px/1.45 var(--mono); }
  .composer textarea:focus { outline: 0; }
  .composer textarea::placeholder { color: var(--faint); }
  .send { width: 36px; height: 36px; flex: none; border: 1px solid color-mix(in srgb, var(--amber) 45%, var(--line)); border-radius: 8px; background: transparent; color: var(--amber); display: grid; place-items: center; cursor: pointer; transition: transform .12s, background .15s, opacity .2s; }
  .send:active { transform: scale(.9); }
  .send:disabled { opacity: .4; cursor: default; }
  .send:not(:disabled) { background: color-mix(in srgb, var(--amber) 16%, transparent); }
  .send.stop { color: var(--err); border-color: color-mix(in srgb, var(--err) 50%, var(--line)); background: color-mix(in srgb, var(--err) 14%, transparent); }
  .send svg { width: 17px; height: 17px; }
  .status { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px; font-size: 11.5px; color: var(--faint); }
  .status .l { display: flex; align-items: center; gap: 6px; }
  .status .l .d { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }

    if (!nk.t.hidden) scrollEnd(nk.t);
  }
  function nekoErr(nk, text) { nk.state = { text, act: [], done: true, error: true }; nk.t.classList.add("err"); nk.proc.innerHTML = ""; nk.body.textContent = text; }
  async function copyFromBrowser(all) {
    const host = currentHost();
    const turns = [...log.querySelectorAll(".turn")].filter((turn) => turn.dataset.host === host && !turn.classList.contains("mirror-live") && !turn.classList.contains("local-note"));
    const chosen = all ? turns : [...turns].reverse().filter((turn) => turn.classList.contains("neko")).slice(0, 1);
    const text = (all ? chosen : chosen.reverse()).map((turn) => String(turn.textContent || "").trim()).filter(Boolean).join("\n\n");
    const nk = nekoTurn(host); nk.t.classList.add("local-note");
    if (!text) { nekoErr(nk, all ? "(nothing in the conversation to copy)" : "(no response to copy yet)"); return; }
    try { await navigator.clipboard.writeText(text); render(nk, { text: all ? "copied the conversation to this device" : "copied the last response to this device", act: [], done: true }); }
    catch { nekoErr(nk, "clipboard permission was blocked by the browser"); }
  }

  function clearMirrorHost(host) {
    for (const turn of log.querySelectorAll(".turn")) if (turn.dataset.host === host) turn.remove();
  }
  function removeMirrorLive(host) {
    for (const el of log.querySelectorAll(".mirror-live")) if (el.dataset.host === host) el.remove();
  }
  function appendMirrorLine(line, host) {
    if (!line || line.kind === "welcome") return;
    if (isRelaySetupLine(line)) return;
    if ([...log.querySelectorAll(".mirror-line")].some((el) => el.dataset.host === host && el.dataset.lineId === String(line.id))) return;
    removeMirrorLive(host);
    const t = document.createElement("div");
    t.className = "turn mirror-line" + (line.kind === "user" ? " user" : " neko") + (line.kind === "error" ? " err" : "");
    t.dataset.host = host; t.dataset.lineId = String(line.id ?? ""); t.hidden = host !== currentHost();
    if (line.kind === "user") {
      const mk = document.createElement("span"); mk.className = "mk"; mk.textContent = "> ";
      t.append(mk, document.createTextNode(String(line.text || "")));
    } else if (line.kind === "assistant") {
      const body = document.createElement("div"); body.className = "body"; body.innerHTML = md(String(line.text || "")); t.appendChild(body);
    } else if (line.kind === "tool_call") {
      const proc = document.createElement("div"); proc.className = "proc";
      const dot = document.createElement("span"); dot.className = "b"; dot.textContent = "●";
      proc.append(dot, document.createTextNode("  " + String(line.text || ""))); t.appendChild(proc);
    } else {
      const body = document.createElement("div"); body.className = line.kind === "tool_result" ? "proc" : "body";
      body.textContent = (line.kind === "tool_result" ? "  └ " : "") + String(line.summary || line.text || ""); t.appendChild(body);
    }
    log.appendChild(t); if (!t.hidden) scrollEnd(t);
  }
  function isRelaySetupLine(line) {
    if (line?.kind !== "info") return false;
    const text = String(line.text || ""), rows = text.trim().split("\n");
    return /^relay session [A-Z0-9-]+ (?:on\b|-\s*open:)/i.test(text)
      || /^open this session:/i.test(text)
      || (rows.length > 8 && rows.filter((row) => /^[ █▄▀]+$/.test(row.trim())).length >= rows.length - 1);
  }
  function applyMirrorEvent(event, host) {
    if (!event || pending.has(host)) return;
    if (event.type === "snapshot") {
      clearMirrorHost(host);
      for (const line of Array.isArray(event.lines) ? event.lines : []) appendMirrorLine(line, host);
      return;
    }
    if (event.type === "line") { appendMirrorLine(event.line, host); return; }
    if (event.type === "stream") {
      removeMirrorLive(host);
      if (!event.text) return;
      const t = document.createElement("div"); t.className = "turn neko mirror-live"; t.dataset.host = host; t.hidden = host !== currentHost();
      const body = document.createElement("div"); body.className = "body"; body.innerHTML = md(String(event.text)); t.appendChild(body); log.appendChild(t);
      if (!t.hidden) scrollEnd(t); return;
    }
    if (event.type === "activity") {
      removeMirrorLive(host);
      const t = document.createElement("div"); t.className = "turn neko mirror-live"; t.dataset.host = host; t.hidden = host !== currentHost();
      const proc = document.createElement("div"); proc.className = "proc"; proc.textContent = "●  " + String(event.text || ""); t.appendChild(proc); log.appendChild(t);
      if (!t.hidden) scrollEnd(t);
    }
  }
  function connectMirror(force = false) {
    const host = currentHost();
    if (!paired() || !host) return;
    if (!force && mirrorSocket && mirrorHost === host && mirrorSocket.readyState < 2) return;
    clearTimeout(mirrorRetry); mirrorRetry = null;
    try { mirrorSocket?.close(); } catch {}
    mirrorReady = false; mirrorHost = host;
    mirrorChain = Promise.resolve();
    const socket = new WebSocket(base().replace(/^http/, "ws") + "/client-ws?session=" + encodeURIComponent(session.value.trim()) + "&host=" + encodeURIComponent(host), ["neko-relay", "t." + token.value.trim()]);
    mirrorSocket = socket;
    socket.onopen = () => { mirrorFailures = 0; };
    socket.onmessage = (ev) => { mirrorChain = mirrorChain.then(async () => {
      let frame; try { frame = JSON.parse(String(ev.data)); } catch { return; }
      if (frame.t === "presence" && frame.meta) {
        const k = await key();
        const raw = k && frame.meta.iv ? await unseal(k, frame.meta) : frame.meta;
        const next = typeof raw === "string" ? JSON.parse(raw) : raw;
        const row = hosts.find((h) => h.id === host);
        if (row) { row.meta = { ...(row.meta || {}), ...next }; row.online = true; }
        online = true; refresh(); return;
      }
      if (frame.t === "mirror_reset") { mirrorSeqByHost[host] = 0; clearMirrorHost(host); removeMirrorLive(host); return; }
      if (frame.t === "mirror_ready") { mirrorSeqByHost[host] = Math.max(Number(mirrorSeqByHost[host] || 0), Number(frame.seq || 0)); mirrorReady = true; syncEmpty(); return; }
      if (frame.t !== "event" || !frame.event) return;
      if (Number(frame.seq) > 0) {
        const previous = Number(mirrorSeqByHost[host] || 0);
        if (Number(frame.seq) <= previous) return;
        if (mirrorReady && previous && Number(frame.seq) > previous + 1) { socket.close(1012, "mirror gap"); return; }
        mirrorSeqByHost[host] = Number(frame.seq);
      }
      const k = await key();
      const raw = k && frame.event.iv ? await unseal(k, frame.event) : frame.event;
      applyMirrorEvent(JSON.parse(raw), host);
    }).catch(() => { kidMismatch = true; refresh(); }); };
    socket.onclose = () => { if (mirrorSocket === socket) {
      mirrorSocket = null; mirrorReady = false;
      const delay = Math.min(1_000 * 2 ** mirrorFailures++, 25_000);
      mirrorRetry = setTimeout(() => connectMirror(true), delay);
    } };
  }

  function restoreHost(host) {
    if (!host || loadedHosts.has(host)) return;
    loadedHosts.add(host);
    for (const item of Array.isArray(historyByHost[host]) ? historyByHost[host] : []) {
      userTurn(String(item.user || ""), host);
      const nk = nekoTurn(host);
      if (item.state?.error) nekoErr(nk, String(item.state.text || "error"));
      else render(nk, { text: String(item.state?.text || ""), act: Array.isArray(item.state?.act) ? item.state.act : [], done: true });
    }
  }
  function rememberTurn(host, user, state) {
    if (!host || !state) return;
    const rows = Array.isArray(historyByHost[host]) ? historyByHost[host] : [];
    rows.push({ user, state: { text: String(state.text || ""), act: Array.isArray(state.act) ? state.act.slice(-200) : [], error: !!state.error } });
    historyByHost[host] = rows.slice(-50);
    try {
      const histories = JSON.parse(localStorage.nekoRelayHistories || "{}"); histories[session.value.trim()] = historyByHost;
      localStorage.nekoRelayHistories = JSON.stringify(histories); localStorage.nekoRelayHistory = JSON.stringify(historyByHost);
    } catch {}
  }

  const SEND = $("send").innerHTML;
  const STOP = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  function paintComposer() {
    const on = hostWorking() && !m.value.trim();
    const approval = !!selectedHost()?.meta?.ui?.approval;
    const overlay = !!selectedHost()?.meta?.ui?.overlay;
    $("send").disabled = approval || overlay;
    $("send").classList.toggle("stop", on && !approval && !overlay); $("send").innerHTML = on && !approval && !overlay ? STOP : SEND; $("send").setAttribute("aria-label", approval ? "approval required" : overlay ? "selection required" : on ? "stop" : "send");
  }
  function setAwaiting(host, on) {
    const count = Number(pending.get(host) || 0);
    if (on) pending.set(host, count + 1);
    else if (count <= 1) pending.delete(host);
    else pending.set(host, count - 1);
    renderSessions(); refresh();
  }

  $("f").onsubmit = async (e) => {
    e.preventDefault();
    const suggested = slashMatches();
    if (suggested.length && !/\s/.test(m.value)) m.value = suggested[Math.min(slashSel, suggested.length - 1)].name;
    closeSlash(); slashSel = 0; slashDismissed = "";
    const host = currentHost();
    const silentControl = m.dataset.control === "cycle-mode";
    const interruptControl = m.dataset.control === "interrupt";
    delete m.dataset.control;
    if (interruptControl || (hostWorking(host) && !m.value.trim() && !silentControl)) { try { await fetch(base() + "/interrupt", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), hostId: host || undefined }) }); } catch {} return; }
    const msg = silentControl ? "\u0000neko:cycle-mode" : m.value.trim(); if (!msg) return;
    if (!silentControl && /^\/copy(?:\s+all)?$/i.test(msg)) {
      m.value = ""; drafts[host] = ""; grow(); await copyFromBrowser(/\s+all$/i.test(msg)); focusComposer(); return;
    }
    if (!paired()) {
      // Guide, don't scold: the pairing card is right there - put the cursor in its paste box.
      const p = $("_paste");
      if (p) { p.focus(); p.placeholder = "pair first - paste the /relay link here"; }
      else { $("cfg").classList.add("show"); $("gear").classList.add("open"); }
      return;
    }
    if (kidMismatch) { const nk = nekoTurn(); nekoErr(nk, "The pairing secret doesn't match Neko's. Run /relay qr on your computer and re-scan (or paste the fresh link in settings)."); return; }
    if (!host) { const nk = nekoTurn(); nekoErr(nk, "No Neko session is registered yet. Run /relay in a local Neko terminal first."); return; }
    if (!silentControl) { m.value = ""; drafts[host] = ""; historyPosByHost[host] = Infinity; grow(); userTurn(msg, host); }
    const nk = nekoTurn(host);
    if (silentControl) nk.t.style.display = "none";
    render(nk, { text: "", act: [], done: false });
    setAwaiting(host, true);
    try {
      const k = await key();
      const payload = k ? await sealMsg(k, msg) : msg;
      const r = await fetch(base() + "/send", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), hostId: host, message: payload }) });
      if (!r.ok) { nekoErr(nk, r.status === 401 ? "Not authorized — the pairing is stale. Re-scan the QR from /relay." : "send failed (HTTP " + r.status + ")"); return; }
      const { id } = await r.json();
      let seen = 0, done = false, warned = false, saw = false;
      const t0 = Date.now();
      while (!done && Date.now() - t0 < 60 * 60_000) {
        let rr;
        try {
          rr = await fetch(base() + "/result?session=" + encodeURIComponent(session.value.trim()) + "&id=" + id + "&seen=" + seen, { headers: auth() });
        } catch { // a mobile-network blip must not abandon the turn - Neko is still working
          await new Promise((res) => setTimeout(res, 1500));
          continue;
        }
        if (rr.status === 200) {
          const g = await rr.json(); seen = g.seq || seen; done = !!g.done; saw = true;
          let raw;
          try { raw = k && g.reply && g.reply.iv ? await unseal(k, g.reply) : g.reply; }
          catch { nekoErr(nk, "Can't decrypt the reply — the pairing secret doesn't match. Run /relay qr on your computer and re-scan."); checkAlive(); return; }
          const state = parseReply(raw, host); state.done = done; render(nk, state);
        } else if (rr.status === 401) {
          nekoErr(nk, "Not authorized — this device was unpaired or the pairing rotated.");
          return;
        } else if (!warned) {
          await checkAlive();
          const target = hosts.find((h) => h.id === host);
          if (target?.online === false) { render(nk, { text: "", act: ["Neko is offline — the task is queued and runs when /relay reconnects"], done: false }); warned = true; }
        }
      }
      if (!done && !saw) nekoErr(nk, "No reply — is /relay running on your computer?");
    } catch (err) { nekoErr(nk, "error: " + err.message); }
    finally {
      if (silentControl) nk.t.remove(); else rememberTurn(host, msg, nk.state);
      setAwaiting(host, false); if (currentHost() === host) m.focus(); checkAlive();
      if (silentControl) setTimeout(checkAlive, 1_200);
      if (mirrorReady) setTimeout(() => connectMirror(true), 150); // replace optimistic UI with host-authoritative replay
    }
  };

  refresh(); checkAlive(); requestAnimationFrame(focusComposer);
  setInterval(renderLiveUi, 1_000);
  setInterval(checkAlive, 25_000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) { checkAlive(); requestAnimationFrame(focusComposer); } });
</script>
</body></html>
