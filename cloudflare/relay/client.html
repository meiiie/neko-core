<style>
  /* Neko remote = the Neko terminal, on your phone. Same monospace, same amber (#e6932e), same
     dim rules and `>` prompt and bottom status bar. Every rule below mirrors a real terminal element;
     nothing decorative. */
  :root {
    color-scheme: dark;
    --bg: #0c0c0c; --ink: #d4d4d4; --dim: #9a9a9a; --faint: #6a6a6a;
    --amber: #e6932e; --cyan: #56b6c2; --ok: #3fb950; --err: #f47067;
    --line: #262626; --line2: #333;
    --mono: "Cascadia Mono", "Cascadia Code", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.65 var(--mono); overscroll-behavior: none; overflow-x: hidden; }
  a { color: var(--cyan); text-underline-offset: 2px; }

  /* Centered column framed like a terminal window on wide screens (the desktop fix). */
  .app { max-width: 820px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
  @media (min-width: 860px) { .app { border-left: 1px solid var(--line); border-right: 1px solid var(--line); } }

  /* Header = the CLI's banner, verbatim: kaomoji logo column + [title / status / host] block. */
  header { position: sticky; top: 0; z-index: 5; display: grid; grid-template-columns: auto 1fr auto; align-items: start; gap: 14px; padding: 13px 16px 11px; padding-top: max(13px, env(safe-area-inset-top)); background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .mark { color: var(--amber); font-size: 14px; line-height: 1.6; letter-spacing: 1px; white-space: nowrap; }
  .hgrid { min-width: 0; }
  .htitle { color: var(--ink); font-weight: 700; letter-spacing: .2px; }
  .htitle small { color: var(--dim); font-weight: 400; }
  .hstatus { color: var(--dim); font-size: 12.5px; margin-top: 1px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .hstatus .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex: none; }
  .hstatus.ok { color: var(--ok); } .hstatus.ok .dot { background: var(--ok); animation: pulse 2.6s ease-out infinite; }
  .hstatus.warn { color: var(--amber); } .hstatus.warn .dot { background: var(--amber); }
  .hstatus.err { color: var(--err); } .hstatus.err .dot { background: var(--err); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 55%, transparent); } 70%,100% { box-shadow: 0 0 0 6px transparent; } }
  .hhost { color: var(--faint); font-size: 12px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hactions { display: flex; align-items: center; gap: 7px; }
  .hostpick { min-width: 30px; height: 30px; padding: 0 9px; border: 1px solid var(--line); background: transparent; border-radius: 7px; color: var(--dim); font: 11.5px var(--mono); cursor: pointer; }
  .hostpick.open, .hostpick:active { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, var(--line)); }
  .gear { width: 30px; height: 30px; border: 1px solid var(--line); background: transparent; border-radius: 7px; color: var(--dim); display: grid; place-items: center; cursor: pointer; transition: color .15s, border-color .15s; }
  .gear:active { transform: scale(.92); }
  .gear.open { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, var(--line)); }
  .gear svg { width: 15px; height: 15px; }

  /* Settings drawer = manual/advanced pairing + relay. Hidden until the gear opens it. */
  .cfg { display: grid; gap: 9px; padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; border-bottom: 1px solid transparent; }
  .cfg.show { max-height: 420px; padding: 13px 16px 15px; border-bottom-color: var(--line); }
  .cfg label { font-size: 11px; color: var(--faint); letter-spacing: .3px; }
  .cfg input { background: #0a0a0a; border: 1px solid var(--line2); color: var(--ink); border-radius: 7px; padding: 9px 11px; font: 13px var(--mono); transition: border-color .15s, box-shadow .15s; }
  .cfg input:focus { outline: 0; border-color: var(--amber); box-shadow: 0 0 0 2px color-mix(in srgb, var(--amber) 22%, transparent); }
  .cfg .btn { justify-self: start; background: transparent; border: 1px solid var(--line2); color: var(--dim); border-radius: 7px; padding: 7px 12px; font: 12.5px var(--mono); cursor: pointer; }
  .cfg .btn:active { transform: scale(.96); }

  /* One pairing is a hub; this terminal-like drawer switches among running/recent Neko sessions. */
  .sessions { display: none; padding: 7px 10px 9px; border-bottom: 1px solid var(--line); background: #0a0a0a; }
  .sessions.show { display: grid; gap: 4px; }
  .session { width: 100%; display: grid; grid-template-columns: 9px minmax(0,1fr) auto; gap: 9px; align-items: center; text-align: left; border: 1px solid transparent; border-radius: 6px; padding: 7px 8px; background: transparent; color: var(--ink); font: 12.5px/1.35 var(--mono); cursor: pointer; }
  .session:hover, .session.active { border-color: var(--line2); background: #111; }
  .session .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .session.online .sdot { background: var(--ok); }
  .session .smain { min-width: 0; }
  .session .sname, .session .spath { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session .spath, .session .smodel { color: var(--faint); font-size: 11px; }
  .session.busy .smodel { color: var(--amber); }

  /* Transcript = terminal flow: `> ` user echo (cyan), neko reply, `●` tool lines. No chat bubbles. */
  #log { flex: 1; padding: 14px 16px 24px; }
  .turn { white-space: pre-wrap; overflow-wrap: anywhere; }
  .turn.user { color: var(--cyan); margin-top: 18px; }
  .turn.user:first-child { margin-top: 2px; }
  .turn.user .mk { color: var(--amber); }
  .turn.neko { margin-top: 6px; color: var(--ink); }
  .turn.neko.err { color: var(--err); }
  .proc { color: var(--dim); font-size: 13px; line-height: 1.75; }
  .proc .b { color: var(--ok); }
  .proc .sp { color: var(--amber); }
  .body b { color: var(--ink); font-weight: 700; }
  .body a { word-break: break-all; }
  .body pre { background: #0a0a0a; border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; white-space: pre; font-size: 13px; }
  .body code { color: #d7ba7d; }
  .body pre code { color: var(--ink); }
  .typing { display: inline-flex; gap: 4px; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); animation: bob 1.1s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bob { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-4px); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .typing i, .hstatus.ok .dot { animation: none; } }

  /* Pairing card (unpaired) = a calm centered focus, not a field dump. */
  .pair { max-width: 360px; margin: 8vh auto 0; text-align: center; padding: 0 8px; }
  .pair img { width: 66px; height: 66px; border-radius: 16px; margin-bottom: 14px; }
  .pair h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--ink); }
  .pair p { color: var(--dim); font-size: 13px; line-height: 1.7; margin: 0 0 16px; }
  .pair p code { color: var(--amber); }
  .pair input { width: 100%; background: #0a0a0a; border: 1px solid var(--line2); color: var(--ink); border-radius: 8px; padding: 11px 12px; font: 13px var(--mono); text-align: center; }
  .pair input:focus { outline: 0; border-color: var(--amber); box-shadow: 0 0 0 2px color-mix(in srgb, var(--amber) 22%, transparent); }
  .pair .adv { margin-top: 14px; color: var(--faint); font-size: 12.5px; cursor: pointer; user-select: none; }
  .pair .note { color: var(--faint); font-size: 11.5px; line-height: 1.7; margin-top: 18px; }
  .idle { color: var(--faint); padding: 6px 0; font-size: 12.5px; }

  /* Composer = the terminal's rule-framed `>` prompt + a bottom status bar. */
  .foot { position: sticky; bottom: 0; background: color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); }
  .composer { display: flex; align-items: flex-end; gap: 9px; padding: 9px 16px 7px; }
  .composer .pr { color: var(--amber); padding: 9px 0; font-size: 15px; line-height: 1.4; }
  .composer textarea { flex: 1; resize: none; max-height: 128px; background: transparent; border: 0; color: var(--ink); padding: 9px 0; font: 14px/1.45 var(--mono); }
  .composer textarea:focus { outline: 0; }
  .composer textarea::placeholder { color: var(--faint); }
  .send { width: 36px; height: 36px; flex: none; border: 1px solid color-mix(in srgb, var(--amber) 45%, var(--line)); border-radius: 8px; background: transparent; color: var(--amber); display: grid; place-items: center; cursor: pointer; transition: transform .12s, background .15s, opacity .2s; }
  .send:active { transform: scale(.9); }
  .send:disabled { opacity: .4; cursor: default; }
  .send:not(:disabled) { background: color-mix(in srgb, var(--amber) 16%, transparent); }
  .send.stop { color: var(--err); border-color: color-mix(in srgb, var(--err) 50%, var(--line)); background: color-mix(in srgb, var(--err) 14%, transparent); }
  .send svg { width: 17px; height: 17px; }
  .status { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px; font-size: 11.5px; color: var(--faint); }
  .status .l { display: flex; align-items: center; gap: 6px; }
  .status .l .d { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }
  .status.ok .l { color: var(--ok); } .status.ok .l .d { background: var(--ok); }
  .status.warn .l { color: var(--amber); } .status.warn .l .d { background: var(--amber); }
  .status.err .l { color: var(--err); } .status.err .l .d { background: var(--err); }
</style></head>
<body>
<div class="app">
  <header>
    <div class="mark">ハ・・マ</div>
    <div class="hgrid">
      <div class="htitle"><span id="htitle">Neko Code</span> <small>· remote</small></div>
      <div class="hstatus" id="hstatus"><span class="dot"></span><span id="hstatustxt">not paired</span></div>
      <div class="hhost" id="hhost"></div>
    </div>
    <div class="hactions"><button class="hostpick" id="hostpick" type="button" aria-label="switch Neko session" aria-expanded="false">sessions</button>
    <button class="gear" id="gear" aria-label="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>
  <div class="sessions" id="sessions" role="listbox" aria-label="Neko sessions"></div>
  <div class="cfg" id="cfg">
    <label for="relay">relay URL</label><input id="relay" autocomplete="off" placeholder="https://neko-relay.<you>.workers.dev">
    <label for="session">session</label><input id="session" autocomplete="off" placeholder="from /relay">
    <label for="token">token</label><input id="token" autocomplete="off" type="password" placeholder="from /relay">
    <label for="secret">secret (end-to-end key)</label><input id="secret" autocomplete="off" type="password" placeholder="from /relay">
    <button class="btn" id="unpair" type="button">unpair this device</button>
  </div>
  <div id="log" role="log" aria-live="polite" aria-relevant="additions text"></div>
  <div class="foot">
    <form class="composer" id="f">
      <span class="pr">&gt;</span>
      <textarea id="m" rows="1" aria-label="message Neko" placeholder='Try: "run the tests"   or   /help' autocomplete="off" autocapitalize="sentences" enterkeyhint="send"></textarea>
      <button class="send" id="send" type="submit" aria-label="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </form>
    <div class="status" id="status" role="status" aria-live="polite"><span class="l"><span id="statustxt">⏵⏵ not paired</span></span><span class="r" id="statusr">remote</span></div>
  </div>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const log = $("log"), relay = $("relay"), session = $("session"), token = $("token"), secret = $("secret"), m = $("m");
  relay.value = location.origin;
  $("hhost").textContent = location.host;
  let hosts = [], activeHost = "", online = null, kidMismatch = false, hostModel = "";
  const pending = new Map(), loadedHosts = new Set(), drafts = {};
  let historyByHost = {};
  try { activeHost = localStorage.nekoActiveHost || ""; historyByHost = JSON.parse(localStorage.nekoRelayHistory || "{}"); } catch {}
  const currentHost = () => activeHost || hosts[0]?.id || "";
  const selectedHost = () => hosts.find((h) => h.id === currentHost()) || null;

  const save = () => { try { localStorage.nekoSession = session.value; localStorage.nekoToken = token.value; localStorage.nekoSecret = secret.value; } catch {} };
  function applyPairing(str) {
    const hashAt = str.indexOf("#");
    const h = new URLSearchParams(hashAt >= 0 ? str.slice(hashAt + 1) : str);
    if (!(h.get("s") || h.get("t") || h.get("k"))) return false;
    if (h.get("s")) session.value = h.get("s");
    if (h.get("t")) token.value = h.get("t");
    if (h.get("k")) secret.value = h.get("k");
    save(); // persist IMMEDIATELY - a QR scan must survive a reload (v1 only saved on manual typing)
    return true;
  }
  if (location.hash.length > 1 && applyPairing(location.hash)) {
    history.replaceState(null, "", location.pathname);
  } else {
    try { session.value = localStorage.nekoSession||""; token.value = localStorage.nekoToken||""; secret.value = localStorage.nekoSecret||""; } catch {}
  }

  const paired = () => !!(session.value.trim() && token.value.trim());
  const base = () => relay.value.trim().replace(/\/+$/, "");
  const auth = () => ({ authorization: "Bearer " + token.value.trim() });

  function setStatus(el, txtEl, cls, txt) { el.className = el.className.split(" ")[0] + (cls ? " " + cls : ""); txtEl.textContent = txt; }
  function refresh() {
    const p = paired();
    const selected = selectedHost();
    if (selected) online = !!selected.online;
    const working = pending.has(currentHost());
    const meta = selected?.meta || {};
    hostModel = meta.model ? String(meta.model).split("/").pop() : hostModel;
    const cls = !p ? "" : kidMismatch ? "err" : online ? "ok" : online === false ? "warn" : "";
    const txt = !p ? "not paired"
      : kidMismatch ? "key mismatch"
      : working ? "working · E2E · streaming"
      : !hosts.length ? "paired · waiting for Neko"
      : online === null ? "paired · E2E"
      : online ? "online · E2E · streaming" : "offline · queued";
    setStatus($("hstatus"), $("hstatustxt"), cls, txt);
    // The bottom bar mirrors the CLI's mode indicator: `⏵⏵ state` left, `model · remote` right.
    setStatus($("status"), $("statustxt"), cls, "⏵⏵ " + (!p ? "not paired" : kidMismatch ? "key mismatch" : working ? "working" : online ? "online · E2E" : online === false ? "offline" : "E2E"));
    $("statusr").textContent = (hostModel ? hostModel + " · " : "") + "remote";
    $("htitle").textContent = meta.title || "Neko Code";
    $("hhost").textContent = meta.cwd || location.host;
    $("hostpick").textContent = hosts.length ? `${hosts.length} session${hosts.length === 1 ? "" : "s"}` : "sessions";
    $("hostpick").disabled = !p;
    paintComposer();
    syncEmpty();
  }
  async function myKid() {
    const s = secret.value.trim();
    if (!s || !crypto.subtle) return null;
    const d = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return [...new Uint8Array(d)].map((b) => b.toString(16).padStart(2, "0")).join("").slice(0, 8);
  }
  async function loadSessions() {
    const r = await fetch(base() + "/sessions?session=" + encodeURIComponent(session.value.trim()), { headers: auth() });
    if (!r.ok) {
      // v2 Worker compatibility: it has one implicit host and ignores the extra hostId field.
      if (r.status === 404 && !hosts.length) { hosts = [{ id: "default", online, meta: { title: "Neko Code" } }]; activeHost = "default"; renderSessions(); switchHost(activeHost, false); }
      return;
    }
    const data = await r.json();
    const k = await key();
    const decoded = [];
    for (const row of Array.isArray(data.hosts) ? data.hosts : []) {
      let meta = {};
      try {
        if (k && row.meta?.iv && row.meta?.ct) meta = JSON.parse(await unseal(k, row.meta));
        else if (row.meta && !row.meta.iv) meta = row.meta;
      } catch { /* wrong key is reported by kid; keep routing metadata opaque */ }
      decoded.push({ ...row, meta });
    }
    hosts = decoded.sort((a, b) => Number(b.online) - Number(a.online) || Number(b.lastSeen || 0) - Number(a.lastSeen || 0));
    if (!hosts.some((h) => h.id === activeHost)) activeHost = hosts.find((h) => h.online)?.id || hosts[0]?.id || "";
    renderSessions();
    if (activeHost) switchHost(activeHost, false);
  }
  function renderSessions() {
    const box = $("sessions"); box.replaceChildren();
    for (const host of hosts) {
      const meta = host.meta || {};
      const button = document.createElement("button");
      button.type = "button"; button.role = "option";
      button.className = "session" + (host.online ? " online" : "") + ((meta.busy || pending.has(host.id)) ? " busy" : "") + (host.id === currentHost() ? " active" : "");
      button.setAttribute("aria-selected", host.id === currentHost() ? "true" : "false");
      const dot = document.createElement("span"); dot.className = "sdot";
      const main = document.createElement("span"); main.className = "smain";
      const name = document.createElement("span"); name.className = "sname"; name.textContent = meta.title || "Neko session";
      const path = document.createElement("span"); path.className = "spath"; path.textContent = meta.cwd || (host.online ? "online" : "offline");
      const model = document.createElement("span"); model.className = "smodel"; model.textContent = (meta.busy || pending.has(host.id)) ? "working" : (meta.model ? String(meta.model).split("/").pop() : (host.online ? "ready" : "offline"));
      main.append(name, path); button.append(dot, main, model);
      button.onclick = () => switchHost(host.id);
      box.appendChild(button);
    }
  }
  function switchHost(id, close = true) {
    const previous = currentHost(); if (previous) drafts[previous] = m.value;
    activeHost = id || "";
    try { localStorage.nekoActiveHost = activeHost; } catch {}
    for (const turn of log.querySelectorAll(".turn")) turn.hidden = turn.dataset.host !== activeHost;
    restoreHost(activeHost);
    const selected = selectedHost(); online = selected ? !!selected.online : null; hostModel = "";
    m.value = drafts[activeHost] || ""; grow();
    if (close) { $("sessions").classList.remove("show"); $("hostpick").classList.remove("open"); $("hostpick").setAttribute("aria-expanded", "false"); m.focus(); }
    emptyKey = "";
    renderSessions(); refresh();
  }
  async function checkAlive() {
    if (!paired()) { online = null; kidMismatch = false; refresh(); return; }
    try {
      await loadSessions();
      const hid = currentHost();
      const r = await fetch(base() + "/alive?session=" + encodeURIComponent(session.value.trim()) + (hid ? "&host=" + encodeURIComponent(hid) : ""), { headers: auth() });
      if (r.ok) {
        const g = await r.json(); online = !!g.online;
        const selected = selectedHost(); if (selected) selected.online = online;
        const mine = await myKid(); kidMismatch = !!(g.kid && mine && g.kid !== mine);
      }
      else { online = null; kidMismatch = false; }
    } catch { online = null; }
    refresh();
  }
  for (const el of [relay, session, token, secret]) el.oninput = () => { save(); online = null; kidMismatch = false; refresh(); checkAlive(); };
  $("gear").onclick = () => { const c = $("cfg"); c.classList.toggle("show"); $("gear").classList.toggle("open", c.classList.contains("show")); };
  $("hostpick").onclick = () => { const s = $("sessions"); s.classList.toggle("show"); $("hostpick").classList.toggle("open", s.classList.contains("show")); $("hostpick").setAttribute("aria-expanded", s.classList.contains("show") ? "true" : "false"); };
  $("unpair").onclick = () => {
    for (const hostId of pending.keys()) fetch(base() + "/interrupt", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), hostId }) }).catch(() => {});
    session.value = token.value = secret.value = ""; save(); hosts = []; activeHost = ""; online = null; kidMismatch = false;
    historyByHost = {}; for (const key of Object.keys(drafts)) delete drafts[key];
    try { localStorage.removeItem("nekoRelayHistory"); localStorage.removeItem("nekoActiveHost"); } catch {}
    $("cfg").classList.remove("show"); $("gear").classList.remove("open"); $("sessions").classList.remove("show");
    log.replaceChildren(); loadedHosts.clear(); emptyKey = ""; refresh();
  };

  // Empty state: pairing card when unpaired, a quiet hint when paired-but-idle, nothing once chatting.
  function hasTurns() { return [...log.querySelectorAll(".turn")].some((turn) => turn.dataset.host === currentHost()); }
  let emptyKey = ""; // rebuild only on a STATE change - the periodic refresh must not wipe the paste box mid-typing
  function syncEmpty() {
    if (hasTurns()) { emptyKey = "turns"; const gone = $("_empty"); if (gone) gone.remove(); return; }
    const state = paired() ? "paired:" + currentHost() + ":" + hosts.length : "unpaired";
    if (state === emptyKey && $("_empty")) return;
    emptyKey = state;
    let e = $("_empty");
    if (!e) { e = document.createElement("div"); e.id = "_empty"; log.appendChild(e); }
    if (!paired()) {
      e.className = "pair";

  m.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("f").requestSubmit(); } });

  // E2E (AES-256-GCM; key = PBKDF2(secret)) — wire-compatible with the Node host (relay-crypto.ts).
  const b64 = (u) => btoa(String.fromCharCode(...u)), ub64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  let kp = null, kf = "";
  function key() { const s = secret.value.trim(); if (!s) return null;
    if (kf !== s) { kf = s; kp = crypto.subtle.importKey("raw", new TextEncoder().encode(s), "PBKDF2", false, ["deriveKey"])
      .then((b) => crypto.subtle.deriveKey({ name:"PBKDF2", salt:new TextEncoder().encode("neko-relay-e2e-v1"), iterations:100000, hash:"SHA-256" }, b, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"])); }
    return kp; }
  async function sealMsg(k, t) { const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = new Uint8Array(await crypto.subtle.encrypt({ name:"AES-GCM", iv }, k, new TextEncoder().encode(t))); return { iv: b64(iv), ct: b64(ct) }; }
  async function unseal(k, s) { return new TextDecoder().decode(await crypto.subtle.decrypt({ name:"AES-GCM", iv: ub64(s.iv) }, k, ub64(s.ct))); }

  const esc = (t) => t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  function md(t) {
    let s = esc(t);
    // c is already HTML-escaped and MUST stay escaped (un-escaping into innerHTML would let hostile
    // page content, relayed inside a reply's code fence, inject live HTML - XSS).
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, __, c) => "<pre><code>" + c.replace(/\n$/, "") + "</code></pre>");
    s = s.replace(/((?:^\|.*\|[ \t]*$\n?){2,})/gm, (x) => "<pre>" + x.replace(/\n$/, "") + "</pre>");
    s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");
    s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    s = s.replace(/^#{1,4} (.*)$/gm, "<b>$1</b>");
    s = s.replace(/^[-*] /gm, "  • ");
    return s;
  }
  // Process log = the terminal's `●  Tool(args)` lines, verbatim.
  const SPIN = ["⠋","⠙","⠹","⠸","⠼","⠴","⠦","⠧","⠇","⠏"]; let spinI = 0;
  setInterval(() => { spinI = (spinI + 1) % SPIN.length; for (const el of document.querySelectorAll(".proc .sp")) el.textContent = SPIN[spinI]; }, 90);
  function procHtml(act, running) {
    const lines = (act || []).map((l) => '<span class="b">●</span>  ' + esc(l));
    if (running) lines.push('<span class="sp">' + SPIN[spinI] + "</span>  working…");
    return lines.length ? '<div class="proc">' + lines.join("\n") + "</div>" : "";
  }
  function parseReply(raw, host = currentHost()) {
    if (typeof raw === "string" && raw.startsWith("{")) {
      try {
        const o = JSON.parse(raw);
        if (typeof o.text === "string") {
          if (o.model && host === currentHost()) { hostModel = String(o.model).split("/").pop(); refresh(); } // background sessions never overwrite the active status bar
          return { text: o.text, act: Array.isArray(o.act) ? o.act : [] };
        }
      } catch {}
    }
    return { text: String(raw ?? ""), act: [] };
  }

  // Stick to the bottom only when the reader IS at the bottom - streaming must not yank the page
  // down while they scrolled up to read something (the terminal behaves the same way).
  const nearBottom = () => {
    const d = document.scrollingElement;
    return d.scrollHeight - d.clientHeight - d.scrollTop < 160;
  };
  const scrollEnd = (el, force) => {
    if (!force && !nearBottom()) return;
    requestAnimationFrame(() => (el || log.lastElementChild)?.scrollIntoView({ block: "end", behavior: "smooth" }));
  };
  function userTurn(text, host = currentHost()) {
    const e = $("_empty"); if (e) e.remove();
    const t = document.createElement("div"); t.className = "turn user";
    t.dataset.host = host; t.hidden = host !== currentHost();
    const mk = document.createElement("span"); mk.className = "mk"; mk.textContent = "> ";
    t.appendChild(mk); t.appendChild(document.createTextNode(text));
    log.appendChild(t); scrollEnd(t, true); // just sent -> always bring it into view
  }
  function nekoTurn(host = currentHost()) {
    const t = document.createElement("div"); t.className = "turn neko";
    t.dataset.host = host; t.hidden = host !== currentHost();
    const proc = document.createElement("div"); const body = document.createElement("div"); body.className = "body";
    t.appendChild(proc); t.appendChild(body); log.appendChild(t); scrollEnd(t, true);
    return { t, proc, body };
  }
  function render(nk, state) {
    nk.state = state;
    nk.proc.outerHTML = procHtml(state.act, !state.done) || '<div></div>';
    nk.proc = nk.t.firstElementChild;
    nk.body.innerHTML = state.text ? md(state.text) : (!state.done && !state.act?.length ? '<span class="typing"><i></i><i></i><i></i></span>' : "");
    if (!nk.t.hidden) scrollEnd(nk.t);
  }
  function nekoErr(nk, text) { nk.state = { text, act: [], done: true, error: true }; nk.t.classList.add("err"); nk.proc.innerHTML = ""; nk.body.textContent = text; }

  function restoreHost(host) {
    if (!host || loadedHosts.has(host)) return;
    loadedHosts.add(host);
    for (const item of Array.isArray(historyByHost[host]) ? historyByHost[host] : []) {
      userTurn(String(item.user || ""), host);
      const nk = nekoTurn(host);
      if (item.state?.error) nekoErr(nk, String(item.state.text || "error"));
      else render(nk, { text: String(item.state?.text || ""), act: Array.isArray(item.state?.act) ? item.state.act : [], done: true });
    }
  }
  function rememberTurn(host, user, state) {
    if (!host || !state) return;
    const rows = Array.isArray(historyByHost[host]) ? historyByHost[host] : [];
    rows.push({ user, state: { text: String(state.text || ""), act: Array.isArray(state.act) ? state.act.slice(-200) : [], error: !!state.error } });
    historyByHost[host] = rows.slice(-50);
    try { localStorage.nekoRelayHistory = JSON.stringify(historyByHost); } catch {}
  }

  const SEND = $("send").innerHTML;
  const STOP = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  function paintComposer() {
    const on = pending.has(currentHost());
    $("send").classList.toggle("stop", on); $("send").innerHTML = on ? STOP : SEND; $("send").setAttribute("aria-label", on ? "stop" : "send");
  }
  function setAwaiting(host, on) {
    if (on) pending.set(host, true); else pending.delete(host);
    renderSessions(); paintComposer();
  }

  $("f").onsubmit = async (e) => {
    e.preventDefault();
    const host = currentHost();
    if (pending.has(host)) { try { await fetch(base() + "/interrupt", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), hostId: host || undefined }) }); } catch {} return; }
    const msg = m.value.trim(); if (!msg) return;
    if (!paired()) {
      // Guide, don't scold: the pairing card is right there - put the cursor in its paste box.
      const p = $("_paste");
      if (p) { p.focus(); p.placeholder = "pair first - paste the /relay link here"; }
      else { $("cfg").classList.add("show"); $("gear").classList.add("open"); }
      return;
    }
    if (kidMismatch) { const nk = nekoTurn(); nekoErr(nk, "The pairing secret doesn't match Neko's. Run /relay qr on your computer and re-scan (or paste the fresh link in settings)."); return; }
    if (!host) { const nk = nekoTurn(); nekoErr(nk, "No Neko session is registered yet. Run /relay in a local Neko terminal first."); return; }
    m.value = ""; drafts[host] = ""; grow();
    userTurn(msg, host);
    const nk = nekoTurn(host);
    render(nk, { text: "", act: [], done: false });
    setAwaiting(host, true);
    try {
      const k = await key();
      const payload = k ? await sealMsg(k, msg) : msg;
      const r = await fetch(base() + "/send", { method: "POST", headers: { "content-type": "application/json", ...auth() }, body: JSON.stringify({ session: session.value.trim(), hostId: host, message: payload }) });
      if (!r.ok) { nekoErr(nk, r.status === 401 ? "Not authorized — the pairing is stale. Re-scan the QR from /relay." : "send failed (HTTP " + r.status + ")"); return; }
      const { id } = await r.json();
      let seen = 0, done = false, warned = false, saw = false;
      const t0 = Date.now();
      while (!done && Date.now() - t0 < 60 * 60_000) {
        let rr;
        try {
          rr = await fetch(base() + "/result?session=" + encodeURIComponent(session.value.trim()) + "&id=" + id + "&seen=" + seen, { headers: auth() });
        } catch { // a mobile-network blip must not abandon the turn - Neko is still working
          await new Promise((res) => setTimeout(res, 1500));
          continue;
        }
        if (rr.status === 200) {
          const g = await rr.json(); seen = g.seq || seen; done = !!g.done; saw = true;
          let raw;
          try { raw = k && g.reply && g.reply.iv ? await unseal(k, g.reply) : g.reply; }
          catch { nekoErr(nk, "Can't decrypt the reply — the pairing secret doesn't match. Run /relay qr on your computer and re-scan."); checkAlive(); return; }
          const state = parseReply(raw, host); state.done = done; render(nk, state);
        } else if (rr.status === 401) {
          nekoErr(nk, "Not authorized — this device was unpaired or the pairing rotated.");
          return;
        } else if (!warned) {
          await checkAlive();
          const target = hosts.find((h) => h.id === host);
          if (target?.online === false) { render(nk, { text: "", act: ["Neko is offline — the task is queued and runs when /relay reconnects"], done: false }); warned = true; }
        }
      }
      if (!done && !saw) nekoErr(nk, "No reply — is /relay running on your computer?");
    } catch (err) { nekoErr(nk, "error: " + err.message); }
    finally { rememberTurn(host, msg, nk.state); setAwaiting(host, false); if (currentHost() === host) m.focus(); checkAlive(); }
  };

  refresh(); checkAlive();
  setInterval(checkAlive, 25_000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) checkAlive(); });
</script>
</body></html>
