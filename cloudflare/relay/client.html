<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neko remote</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.5 system-ui, sans-serif; background: #0b0b0c; color: #e6e6e6; }
  header { padding: 12px 14px; background: #141416; border-bottom: 1px solid #222; }
  header b { color: #c084fc; }
  .cfg { display: grid; gap: 6px; padding: 12px 14px; border-bottom: 1px solid #1d1d20; }
  .cfg input { background: #16161a; border: 1px solid #2a2a30; color: #e6e6e6; border-radius: 8px; padding: 8px 10px; font: inherit; }
  #log { padding: 12px 14px 90px; }
  .msg { margin: 10px 0; }
  .me { color: #9ad; }
  .me::before { content: "you  "; color: #567; }
  .neko { white-space: pre-wrap; background: #141416; border: 1px solid #222; border-radius: 10px; padding: 10px 12px; }
  .neko::before { content: "neko"; display: block; color: #c084fc; font-size: 12px; margin-bottom: 4px; }
  .dim { color: #667; font-size: 13px; }
  form { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 8px; padding: 10px; background: #0b0b0c; border-top: 1px solid #1d1d20; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  form input { flex: 1; background: #16161a; border: 1px solid #2a2a30; color: #e6e6e6; border-radius: 10px; padding: 11px 12px; font: inherit; }
  form button { background: #7c3aed; color: #fff; border: 0; border-radius: 10px; padding: 0 16px; font: inherit; font-weight: 600; }
  form button:disabled { opacity: .5; }
</style></head>
<body>
<header><b>Neko</b> remote control <span class="dim" id="state">— end-to-end encrypted</span></header>
<div class="cfg">
  <input id="relay" placeholder="relay URL (this site)" autocomplete="off">
  <input id="session" placeholder="session (from /relay)" autocomplete="off">
  <input id="token" placeholder="token (from /relay)" autocomplete="off" type="password">
  <input id="secret" placeholder="secret (E2E pairing code from /relay)" autocomplete="off" type="password">
</div>
<div id="log"></div>
<form id="f">
  <input id="m" placeholder="message for Neko…" autocomplete="off" autocapitalize="off">
  <button id="send" type="submit">Send</button>
</form>
<script>
  const $ = (id) => document.getElementById(id);
  const log = $("log"), relay = $("relay"), session = $("session"), token = $("token"), secret = $("secret");
  relay.value = location.origin; // default to this Worker

  // One-tap pairing: /relay prints a URL with the secret in the fragment (#s=&t=&k=). The browser never
  // sends the fragment to the server, so the secret stays client-side. Parse it, then clear the bar.
  if (location.hash.length > 1) {
    const h = new URLSearchParams(location.hash.slice(1));
    if (h.get("s")) session.value = h.get("s");
    if (h.get("t")) token.value = h.get("t");
    if (h.get("k")) secret.value = h.get("k");
    history.replaceState(null, "", location.pathname);
  } else {
    try { session.value = localStorage.nekoSession || ""; token.value = localStorage.nekoToken || ""; secret.value = localStorage.nekoSecret || ""; } catch {}
  }
  for (const el of [session, token, secret]) el.onchange = () => { try { localStorage.nekoSession = session.value; localStorage.nekoToken = token.value; localStorage.nekoSecret = secret.value; } catch {} };

  // E2E (AES-256-GCM; key = PBKDF2(secret)) — wire-compatible with the Node host (relay-crypto.ts).
  const b64 = (u8) => btoa(String.fromCharCode(...u8));
  const ub64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  let keyPromise = null, keyFor = "";
  function key() {
    const s = secret.value.trim();
    if (!s) return null;
    if (keyFor !== s) {
      keyFor = s;
      keyPromise = crypto.subtle.importKey("raw", new TextEncoder().encode(s), "PBKDF2", false, ["deriveKey"])
        .then((base) => crypto.subtle.deriveKey({ name: "PBKDF2", salt: new TextEncoder().encode("neko-relay-e2e-v1"), iterations: 100000, hash: "SHA-256" }, base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]));
    }
    return keyPromise;
  }
  async function seal(k, text) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, k, new TextEncoder().encode(text)));
    return { iv: b64(iv), ct: b64(ct) };
  }
  async function unseal(k, s) {
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: ub64(s.iv) }, k, ub64(s.ct));
    return new TextDecoder().decode(pt);
  }

  function add(cls, text) { const d = document.createElement("div"); d.className = "msg " + cls; d.textContent = text; log.appendChild(d); window.scrollTo(0, 1e9); return d; }
  const hdr = () => ({ "content-type": "application/json", authorization: "Bearer " + token.value.trim() });

  $("f").onsubmit = async (e) => {
    e.preventDefault();
    const msg = $("m").value.trim(); if (!msg) return;
    if (!session.value || !token.value) { $("state").textContent = "— enter session + token first"; return; }
    $("m").value = ""; $("send").disabled = true;
    add("me", msg);
    const out = add("neko dim", "…");
    try {
      const base = relay.value.trim().replace(/\/+$/, "");
      const k = await key();
      const payload = k ? await seal(k, msg) : msg; // E2E: the relay only ever sees ciphertext
      const r = await fetch(base + "/send", { method: "POST", headers: hdr(), body: JSON.stringify({ session: session.value.trim(), message: payload }) });
      if (!r.ok) { out.className = "msg neko"; out.textContent = "send failed: HTTP " + r.status; return; }
      const { id } = await r.json();
      let reply;
      for (let i = 0; i < 30 && reply === undefined; i++) {
        const rr = await fetch(base + "/result?session=" + encodeURIComponent(session.value.trim()) + "&id=" + id, { headers: hdr() });
        if (rr.status === 200) { const got = (await rr.json()).reply; reply = k && got && got.iv ? await unseal(k, got) : got; }
      }
      out.className = "msg neko";
      out.textContent = reply ?? "(no reply — is Neko's /relay running?)";
    } catch (err) {
      out.className = "msg neko"; out.textContent = "error: " + err.message;
    } finally {
      $("send").disabled = false; $("m").focus();
    }
  };
</script>
</body></html>
