<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b0b0c">
<title>Neko remote</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0b0c; --panel: #141416; --line: #232328; --ink: #ececf0; --dim: #8a8a96;
    --accent: #b483ff; --accent2: #7c3aed; --me: #1a2733; --ok: #34d399; --warn: #fbbf24;
    --r: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; font: 16px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); overscroll-behavior: none; }

  header { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 10px; padding: 11px 14px; padding-top: max(11px, env(safe-area-inset-top)); background: rgba(11,11,12,.82); backdrop-filter: saturate(1.4) blur(12px); border-bottom: 1px solid var(--line); }
  .logo { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 15px; box-shadow: 0 2px 10px -2px var(--accent2); }
  .title { font-weight: 650; letter-spacing: .2px; }
  .pill { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; transition: color .2s, border-color .2s; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 0 0 currentColor; }
  .pill.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 35%, var(--line)); }
  .pill.ok .dot { background: var(--ok); animation: pulse 2.4s ease-out infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 60%, transparent); } 70%,100% { box-shadow: 0 0 0 7px transparent; } }
  .gear { margin-left: 4px; width: 32px; height: 32px; border: 1px solid var(--line); background: var(--panel); border-radius: 9px; color: var(--dim); font-size: 15px; display: grid; place-items: center; cursor: pointer; transition: transform .15s, color .15s; }
  .gear:active { transform: scale(.92); } .gear.open { color: var(--accent); }

  .cfg { display: grid; gap: 8px; padding: 0 14px; max-height: 0; overflow: hidden; transition: max-height .28s ease, padding .28s ease; border-bottom: 1px solid transparent; }
  .cfg.show { max-height: 260px; padding: 12px 14px; border-bottom-color: var(--line); }
  .cfg label { font-size: 11px; color: var(--dim); margin: 2px 0 -4px; text-transform: uppercase; letter-spacing: .6px; }
  .cfg input { background: #0f0f12; border: 1px solid var(--line); color: var(--ink); border-radius: 10px; padding: 10px 12px; font: inherit; transition: border-color .15s, box-shadow .15s; }
  .cfg input:focus { outline: 0; border-color: var(--accent2); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent2) 22%, transparent); }

  #log { padding: 16px 14px 24px; display: flex; flex-direction: column; gap: 14px; min-height: calc(100dvh - 200px); }
  .empty { margin: auto; text-align: center; color: var(--dim); font-size: 14px; }
  .empty .big { font-size: 30px; margin-bottom: 8px; opacity: .8; }
  .row { display: flex; animation: rise .26s cubic-bezier(.2,.7,.3,1) both; }
  .row.me { justify-content: flex-end; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .row { animation: none; } .pill.ok .dot { animation: none; } }
  .bub { max-width: 84%; padding: 10px 13px; border-radius: var(--r); white-space: pre-wrap; word-wrap: break-word; }
  .me .bub { background: var(--me); border: 1px solid color-mix(in srgb, var(--accent2) 18%, var(--line)); border-bottom-right-radius: 5px; }
  .neko .bub { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 5px; }
  .who { font-size: 11px; color: var(--accent); margin: 0 0 4px 2px; font-weight: 600; }
  .neko.err .bub { border-color: color-mix(in srgb, #f87171 45%, var(--line)); color: #fca5a5; }

  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: bob 1.1s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .15s; } .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bob { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }

  .composer { position: sticky; bottom: 0; display: flex; align-items: flex-end; gap: 9px; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); background: rgba(11,11,12,.9); backdrop-filter: blur(12px); border-top: 1px solid var(--line); }
  .composer textarea { flex: 1; resize: none; max-height: 140px; background: #0f0f12; border: 1px solid var(--line); color: var(--ink); border-radius: 13px; padding: 11px 13px; font: inherit; line-height: 1.4; transition: border-color .15s, box-shadow .15s; }
  .composer textarea:focus { outline: 0; border-color: var(--accent2); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent2) 20%, transparent); }
  .send { width: 44px; height: 44px; flex: none; border: 0; border-radius: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; display: grid; place-items: center; cursor: pointer; transition: transform .12s, opacity .2s, filter .2s; box-shadow: 0 4px 14px -4px var(--accent2); }
  .send:active { transform: scale(.9); } .send:disabled { opacity: .45; filter: grayscale(.5); box-shadow: none; cursor: default; }
  .send svg { width: 20px; height: 20px; }
</style></head>
<body>
<header>
  <div class="logo">🐾</div>
  <div class="title">Neko</div>
  <span class="pill" id="pill"><span class="dot"></span><span id="pilltxt">not paired</span></span>
  <button class="gear" id="gear" aria-label="settings">⚙</button>
</header>
<div class="cfg" id="cfg">
  <label>relay URL</label><input id="relay" autocomplete="off" placeholder="https://neko-relay.<you>.workers.dev">
  <label>session</label><input id="session" autocomplete="off" placeholder="from /relay">
  <label>token</label><input id="token" autocomplete="off" type="password" placeholder="from /relay">
  <label>secret (end-to-end key)</label><input id="secret" autocomplete="off" type="password" placeholder="from /relay">
</div>
<div id="log"><div class="empty" id="empty"><div class="big">🐾</div>Paired &amp; encrypted.<br>Send Neko a task from anywhere.</div></div>
<form class="composer" id="f">
  <textarea id="m" rows="1" placeholder="Message Neko…" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"></textarea>
  <button class="send" id="send" type="submit" aria-label="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
</form>
<script>
  const $ = (id) => document.getElementById(id);
  const log = $("log"), relay = $("relay"), session = $("session"), token = $("token"), secret = $("secret"), m = $("m");
  relay.value = location.origin;

  // One-tap pairing: /relay prints a URL with secrets in the #fragment, which the browser never sends.
  if (location.hash.length > 1) {
    const h = new URLSearchParams(location.hash.slice(1));
    if (h.get("s")) session.value = h.get("s");
    if (h.get("t")) token.value = h.get("t");
    if (h.get("k")) secret.value = h.get("k");
    history.replaceState(null, "", location.pathname);
  } else {
    try { session.value = localStorage.nekoSession||""; token.value = localStorage.nekoToken||""; secret.value = localStorage.nekoSecret||""; } catch {}
  }
  const save = () => { try { localStorage.nekoSession = session.value; localStorage.nekoToken = token.value; localStorage.nekoSecret = secret.value; } catch {} };

  // status pill + auto-open settings if not configured
  function refresh() {
    const ready = session.value.trim() && token.value.trim();
    $("pill").className = "pill" + (ready ? " ok" : "");
    $("pilltxt").textContent = ready ? (secret.value.trim() ? "paired · E2E" : "paired") : "not paired";
  }
  for (const el of [relay, session, token, secret]) el.oninput = () => { save(); refresh(); };
  $("gear").onclick = () => { const c = $("cfg"); c.classList.toggle("show"); $("gear").classList.toggle("open", c.classList.contains("show")); };
  if (!(session.value && token.value)) $("gear").click();
  refresh();

  // auto-growing composer; Enter sends, Shift+Enter = newline
  const grow = () => { m.style.height = "auto"; m.style.height = Math.min(m.scrollHeight, 140) + "px"; };
  m.addEventListener("input", grow);
  m.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("f").requestSubmit(); } });

  // E2E (AES-256-GCM; key = PBKDF2(secret)) — wire-compatible with the Node host (relay-crypto.ts)
  const b64 = (u) => btoa(String.fromCharCode(...u)), ub64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  let kp = null, kf = "";
  function key() { const s = secret.value.trim(); if (!s) return null;
    if (kf !== s) { kf = s; kp = crypto.subtle.importKey("raw", new TextEncoder().encode(s), "PBKDF2", false, ["deriveKey"])
      .then((b) => crypto.subtle.deriveKey({ name:"PBKDF2", salt:new TextEncoder().encode("neko-relay-e2e-v1"), iterations:100000, hash:"SHA-256" }, b, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"])); }
    return kp; }
  async function seal(k, t) { const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = new Uint8Array(await crypto.subtle.encrypt({ name:"AES-GCM", iv }, k, new TextEncoder().encode(t))); return { iv: b64(iv), ct: b64(ct) }; }
  async function unseal(k, s) { return new TextDecoder().decode(await crypto.subtle.decrypt({ name:"AES-GCM", iv: ub64(s.iv) }, k, ub64(s.ct))); }

  const empty = $("empty");
  function row(who, cls) { empty?.remove(); const r = document.createElement("div"); r.className = "row " + who + (cls?" "+cls:""); const b = document.createElement("div"); b.className = "bub";
    if (who === "neko") { const w = document.createElement("div"); w.className = "who"; w.textContent = "neko"; r.appendChild(w); } // who label above bubble (neko only)
    r.appendChild(b); log.appendChild(r); requestAnimationFrame(() => r.scrollIntoView({ block: "end", behavior: "smooth" })); return b; }

  $("f").onsubmit = async (e) => {
    e.preventDefault();
    const msg = m.value.trim(); if (!msg) return;
    if (!(session.value.trim() && token.value.trim())) { $("cfg").classList.add("show"); $("gear").classList.add("open"); return; }
    m.value = ""; grow(); $("send").disabled = true;
    row("me").textContent = msg;
    const out = row("neko"); out.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
    try {
      const base = relay.value.trim().replace(/\/+$/, ""), k = await key();
      const payload = k ? await seal(k, msg) : msg;
      const r = await fetch(base + "/send", { method:"POST", headers: { "content-type":"application/json", authorization:"Bearer "+token.value.trim() }, body: JSON.stringify({ session: session.value.trim(), message: payload }) });
      if (!r.ok) { out.closest(".row").classList.add("err"); out.textContent = "send failed (HTTP " + r.status + ")"; return; }
      const { id } = await r.json();
      let reply;
      for (let i = 0; i < 40 && reply === undefined; i++) {
        const rr = await fetch(base + "/result?session=" + encodeURIComponent(session.value.trim()) + "&id=" + id, { headers: { authorization:"Bearer "+token.value.trim() } });
        if (rr.status === 200) { const g = (await rr.json()).reply; reply = k && g && g.iv ? await unseal(k, g) : g; }
      }
      if (reply == null) { out.closest(".row").classList.add("err"); out.textContent = "(no reply — is Neko's /relay running?)"; }
      else out.textContent = reply;
    } catch (err) { out.closest(".row").classList.add("err"); out.textContent = "error: " + err.message; }
    finally { $("send").disabled = false; m.focus(); }
  };
</script>
</body></html>
